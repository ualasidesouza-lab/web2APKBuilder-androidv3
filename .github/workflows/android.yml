name: Android Build

on:
push:
branches:
- main
- master

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Set up Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 17

  - name: Grant execute permission
    run: chmod +x gradlew

  - name: Build APK
    run: ./gradlew assembleDebug
```

